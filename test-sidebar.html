<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .test-controls {
            margin-bottom: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        .test-controls button {
            margin: 5px;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }
        .test-controls button:hover {
            background: #0056b3;
        }
        .test-controls button.active {
            background: #28a745;
        }
    </style>
</head>
<body>
    <h1>Sidebar Component Test</h1>
    
    <div class="test-controls">
        <h3>Test Route Changes:</h3>
        <button onclick="testRoute('/home')" class="active">Home</button>
        <button onclick="testRoute('/inout')">In/Out</button>
        <button onclick="testRoute('/geo')">Geo</button>
        <button onclick="testRoute('/cumulative')">Cumulative</button>
        <button onclick="testRoute('/atms')">ATMs</button>
        <button onclick="testRoute('/failures')">Failures</button>
        <button onclick="testRoute('/journal')">Journal</button>
    </div>

    <side-bar></side-bar>

    <script type="module">
        import { SideBar } from './layout/sidebar.js';
        
        // Test function to simulate route changes
        window.testRoute = function(route) {
            console.log('Testing route:', route);
            
            // Update active button
            document.querySelectorAll('.test-controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Dispatch route change event
            document.dispatchEvent(
                new CustomEvent("route-changed", {
                    detail: { route: route },
                    bubbles: true,
                    composed: true,
                })
            );
        };
    </script>
</body>
</html>
